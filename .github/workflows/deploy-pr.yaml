---
name: PR Build

# yamllint disable-line rule:truthy
on:
  pull_request:
    types:
      - opened
      - synchronize
      - closed
    paths-ignore:
      - docs/**
      - README.md

jobs:
  deploy_pr:
    name: Deploy PR build
    runs-on: ubuntu-latest
    if: ${{ github.event.action != 'closed' && (!contains(github.event.pull_request.head.ref, 'renovate/') || contains(github.event.pull_request.labels.*.name, 'deploy-pr')) }} # yamllint disable-line rule:line-length
    steps:
      - name: Check out code
        uses: actions/checkout@v6.0.3
      - name: Generate version
        id: generate
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_LABEL="pr-${PR_NUMBER}"
          VERSION="0.0.0-${PR_LABEL}"

          echo "Generated PR label: ${PR_LABEL}"
          echo "Generated Balena version: ${VERSION}"
          echo "pr_label=${PR_LABEL}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
      - name: Deploy PR build to Balena
        uses: ./.github/actions/balena-deploy
        id: deploy
        with:
          version: ${{ steps.generate.outputs.version }}
          fleet: ${{ vars.BALENA_SLUG }}
          balena_token: ${{ secrets.BALENA_TOKEN }}
          note: |
            # Block PR build ${{ steps.generate.outputs.pr_label }}
            **PR**: (${{ github.event.pull_request.number }}) ${{ github.event.pull_request.title }}
            **Author**: ${{ github.event.pull_request.user.login }}
            **Branch**: ${{ github.event.pull_request.head.ref }}
            **Commit**: ${{ github.sha }}
            **Version**: ${{ steps.generate.outputs.version }}
      - name: Log result
        run: |
          echo "Built ${{ steps.generate.outputs.pr_label }} as ${{ steps.deploy.outputs.balena_release_version }}"
          echo "Compose pin: bh.cr/${{ vars.BALENA_SLUG }}/${{ steps.generate.outputs.version }}"

  cleanup_temporary_releases:
    name: Cleanup PR releases
    runs-on: ubuntu-latest
    if: ${{ github.event.action == 'closed' }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6.0.3
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
      - name: Install cleanup dependencies
        run: python -m pip install balena-cloud==1.3.0
      - name: Cleanup temporary releases
        run: python tools/cleanup_releases.py --pr-number=${{ github.event.pull_request.number }}
        env:
          BALENA_TOKEN: ${{ secrets.BALENA_TOKEN }}
          BALENA_FLEET_SLUG: ${{ vars.BALENA_SLUG }}
